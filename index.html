<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt 评估与优化工具</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0c0c10;--card:rgba(255,255,255,0.03);--card-solid:#141418;--border:rgba(255,255,255,0.08);--text:#e8e6e3;--text2:#6b6b78;--accent1:#c9a86c;--accent2:#e8d5a3;--accent-g1:#c9a86c;--accent-g2:#a78bfa;--input-bg:rgba(0,0,0,0.3);--radius:16px;--glow:rgba(201,168,108,0.15)}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans SC',system-ui,-apple-system,sans-serif;min-height:100vh;overflow-x:hidden;position:relative}

/* Texture overlay */
body::before{content:'';position:fixed;inset:0;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0}
/* Ambient glow */
body::after{content:'';position:fixed;top:-40%;left:-20%;width:80%;height:80%;background:radial-gradient(ellipse,rgba(201,168,108,0.06) 0%,transparent 70%);pointer-events:none;z-index:0}
body>*{position:relative;z-index:1}
a{color:var(--accent1);text-decoration:none}
a:hover{text-decoration:underline}
::selection{background:var(--accent1);color:#000}

/* Scrollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:var(--accent1)}

/* Nav */
.nav{position:sticky;top:0;z-index:100;background:rgba(12,12,16,0.85);backdrop-filter:blur(20px) saturate(1.2);border-bottom:1px solid var(--border);padding:0 20px}
.nav-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:4px;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none}
.nav-inner::-webkit-scrollbar{display:none}
.nav-brand{font-family:'Noto Serif SC',serif;font-size:20px;font-weight:900;white-space:nowrap;margin-right:20px;padding:18px 0;background:linear-gradient(135deg,var(--accent1),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px}
.nav-item{padding:18px 16px;cursor:pointer;white-space:nowrap;color:var(--text2);font-size:14px;font-weight:500;position:relative;transition:all .3s ease}
.nav-item:hover{color:var(--text)}
.nav-item.active{color:var(--accent1)}
.nav-item.active::after{content:'';position:absolute;bottom:0;left:16px;right:16px;height:2px;background:linear-gradient(90deg,var(--accent1),var(--accent2));border-radius:1px;animation:navGlow 2s ease infinite alternate}
@keyframes navGlow{from{box-shadow:0 0 4px var(--glow)}to{box-shadow:0 0 12px var(--glow)}}

/* Layout */
.container{max-width:1200px;margin:0 auto;padding:28px 20px}
.page{display:none;animation:fadeIn .4s cubic-bezier(.4,0,.2,1)}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
@keyframes breathe{0%,100%{box-shadow:0 0 0 0 var(--glow)}50%{box-shadow:0 0 20px 2px var(--glow)}}

/* Cards */
.card{background:var(--card);backdrop-filter:blur(10px);border:1px solid var(--border);border-radius:var(--radius);padding:28px;margin-bottom:16px;position:relative;transition:border-color .3s,box-shadow .3s}
.card:hover{border-color:rgba(201,168,108,0.15);box-shadow:0 4px 30px rgba(0,0,0,0.3)}
.card::before,.card::after{display:none}
.card-title{font-size:17px;font-weight:700;font-family:'Noto Serif SC',serif;margin-bottom:18px;display:flex;align-items:center;gap:10px;color:var(--text);letter-spacing:1px}
.card-title .icon{width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:18px}

/* Form */
textarea,input[type="text"]{width:100%;background:var(--input-bg);border:1px solid var(--border);border-radius:12px;padding:14px 18px;color:var(--text);font-size:14px;font-family:inherit;resize:vertical;transition:all .3s ease;outline:none}
textarea:focus,input[type="text"]:focus{border-color:var(--accent1);box-shadow:0 0 0 3px var(--glow),0 0 20px var(--glow)}
textarea{min-height:130px}
label{display:block;font-size:13px;color:var(--text2);margin-bottom:8px;font-weight:400}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:11px 24px;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1);font-family:inherit;position:relative;overflow:hidden}
.btn::before{content:'';position:absolute;inset:0;opacity:0;transition:opacity .3s;background:linear-gradient(135deg,rgba(255,255,255,0.1),transparent)}
.btn:hover::before{opacity:1}
.btn-primary{background:linear-gradient(135deg,var(--accent1),#b8944f);color:#0c0c10;box-shadow:0 2px 12px var(--glow)}
.btn-primary:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 6px 24px rgba(201,168,108,0.35)}
.btn-primary:active{transform:translateY(0) scale(0.98);box-shadow:0 2px 8px var(--glow)}
.btn-secondary{background:rgba(255,255,255,0.06);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.2);transform:translateY(-1px)}
.btn-sm{padding:6px 14px;font-size:12px;border-radius:8px}
.btn-danger{background:rgba(220,38,38,0.1);color:#f87171;border:1px solid rgba(220,38,38,0.2)}
.btn-danger:hover{background:rgba(220,38,38,0.2);border-color:rgba(220,38,38,0.4);transform:translateY(-1px)}
.btn-group{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px}

/* Score bar */
.score-bar-wrap{margin-bottom:12px;animation:fadeInUp .3s ease both}
.score-bar-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px}
.score-bar-label span:first-child{color:var(--text2)}
.score-bar-label span:last-child{font-weight:700;color:var(--accent1)}
.score-bar{height:6px;background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden}
.score-bar-fill{height:100%;border-radius:3px;transition:width .8s cubic-bezier(.4,0,.2,1)}
.score-bar-fill.low{background:linear-gradient(90deg,#ef4444,#f97316)}
.score-bar-fill.mid{background:linear-gradient(90deg,#f59e0b,#eab308)}
.score-bar-fill.high{background:linear-gradient(90deg,#34d399,#10b981)}
.score-bar-fill.great{background:linear-gradient(90deg,var(--accent1),var(--accent2))}

/* Score circle */
.score-circle{width:84px;height:84px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:700;margin:0 auto 8px;position:relative}
.score-circle .num{font-size:26px;line-height:1;font-family:'Noto Serif SC',serif}
.score-circle .lbl{font-size:11px;color:var(--text2);margin-top:3px}
.score-circle.grade-s{background:linear-gradient(135deg,rgba(201,168,108,0.15),rgba(167,139,250,0.15));border:2px solid var(--accent1);color:var(--accent1);animation:breathe 3s ease infinite}
.score-circle.grade-a{background:rgba(52,211,153,0.08);border:2px solid #34d399;color:#34d399}
.score-circle.grade-b{background:rgba(96,165,250,0.08);border:2px solid #60a5fa;color:#60a5fa}
.score-circle.grade-c{background:rgba(251,191,36,0.08);border:2px solid #fbbf24;color:#fbbf24}
.score-circle.grade-d{background:rgba(248,113,113,0.08);border:2px solid #f87171;color:#f87171}

/* Table */
.score-table{width:100%;border-collapse:collapse;margin-top:12px}
.score-table th,.score-table td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);font-size:13px}
.score-table th{color:var(--text2);font-weight:500}
.score-table td:last-child{font-weight:600;color:var(--accent1)}

/* Radar */
.radar-wrap{max-width:400px;margin:20px auto}

/* Result cards animation */
.result-card{animation:fadeInUp .5s cubic-bezier(.4,0,.2,1) both}
.result-card:nth-child(2){animation-delay:.06s}
.result-card:nth-child(3){animation-delay:.12s}
.result-card:nth-child(4){animation-delay:.18s}
.result-card:nth-child(5){animation-delay:.24s}

/* Grade badge */
.grade{display:inline-flex;align-items:center;justify-content:center;width:50px;height:50px;border-radius:14px;font-size:22px;font-weight:900;font-family:'Noto Serif SC',serif;background:linear-gradient(135deg,var(--accent1),var(--accent2));color:#0c0c10;margin-right:14px;box-shadow:0 4px 16px var(--glow)}
.score-summary{display:flex;align-items:center;margin:16px 0}
.score-summary .total{font-size:30px;font-weight:900;font-family:'Noto Serif SC',serif}
.score-summary .max{font-size:14px;color:var(--text2);margin-left:4px}
.score-summary .level{margin-left:16px;font-size:13px;padding:5px 14px;border-radius:20px;background:linear-gradient(135deg,rgba(201,168,108,0.12),rgba(167,139,250,0.12));color:var(--accent1);font-weight:600;border:1px solid rgba(201,168,108,0.2)}

/* Tabs */
.tabs{display:flex;gap:4px;margin-bottom:18px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:9px 20px;cursor:pointer;font-size:13px;color:var(--text2);white-space:nowrap;border-radius:8px;transition:all .3s ease;font-weight:500}
.tab:hover{color:var(--text);background:rgba(255,255,255,0.04)}
.tab.active{color:#0c0c10;background:linear-gradient(135deg,var(--accent1),var(--accent2));font-weight:600;box-shadow:0 2px 12px var(--glow)}

/* Template cards */
.tmpl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.tmpl-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden}
.tmpl-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent1),var(--accent2));opacity:0;transition:opacity .3s}
.tmpl-card:hover{border-color:rgba(201,168,108,0.3);transform:translateY(-3px);box-shadow:0 8px 30px rgba(0,0,0,0.3)}
.tmpl-card:hover::before{opacity:1}
.tmpl-card h4{font-size:15px;margin-bottom:8px;font-family:'Noto Serif SC',serif;font-weight:700}
.tmpl-card p{font-size:12px;color:var(--text2);line-height:1.6}
.tmpl-card .tmpl-tag{display:inline-block;font-size:11px;padding:3px 10px;border-radius:6px;background:linear-gradient(135deg,rgba(201,168,108,0.1),rgba(167,139,250,0.1));color:var(--accent1);margin-top:10px;font-weight:500}
.tmpl-card .tmpl-score{float:right;font-size:13px;font-weight:700;color:var(--accent1)}

/* History */
.history-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 18px;margin-bottom:10px;cursor:pointer;transition:all .3s ease}
.history-item:hover{border-color:rgba(201,168,108,0.2);box-shadow:0 2px 16px rgba(0,0,0,0.2)}
.history-meta{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--text2);margin-bottom:6px}
.history-prompt{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.history-score{font-weight:700;color:var(--accent1);font-size:14px}
.history-detail{margin-top:12px;padding-top:12px;border-top:1px solid var(--border);display:none;animation:fadeIn .3s ease}
.history-item.open .history-detail{display:block}
.rank-badge{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:8px;font-size:12px;font-weight:700;margin-right:10px}
.rank-1{background:linear-gradient(135deg,var(--accent1),var(--accent2));color:#0c0c10}
.rank-2{background:rgba(148,163,184,0.15);color:#94a3b8;border:1px solid rgba(148,163,184,0.2)}
.rank-3{background:rgba(180,83,9,0.1);color:#d97706;border:1px solid rgba(180,83,9,0.2)}
.rank-other{background:rgba(255,255,255,0.04);color:var(--text2);border:1px solid var(--border)}

/* Optimize suggestions */
.suggestion{display:flex;gap:12px;padding:14px;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;animation:fadeInUp .3s ease both;transition:border-color .3s}
.suggestion:hover{border-color:rgba(201,168,108,0.15)}
.suggestion .sug-icon{flex-shrink:0;width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.sug-warn{background:rgba(245,158,11,0.1);color:#f59e0b}
.sug-tip{background:rgba(52,211,153,0.1);color:#34d399}
.sug-info{background:rgba(96,165,250,0.1);color:#60a5fa}
.suggestion .sug-text{font-size:13px;line-height:1.6}

/* Model cards */
.model-card{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;animation:fadeInUp .4s ease both;transition:border-color .3s,box-shadow .3s}
.model-card:hover{border-color:rgba(201,168,108,0.15);box-shadow:0 4px 20px rgba(0,0,0,0.2)}
.model-header{padding:14px 18px;font-weight:600;font-size:14px;display:flex;align-items:center;justify-content:space-between}
.model-body{padding:0 18px 18px}
.model-body pre{background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:10px;padding:14px;font-size:12px;line-height:1.7;white-space:pre-wrap;word-break:break-all;color:var(--text);font-family:'Cascadia Code','Fira Code',monospace;max-height:200px;overflow-y:auto}
.model-body .model-note{font-size:12px;color:var(--text2);margin-top:10px;line-height:1.6}
.model-score-bar{margin:10px 0 4px}
.model-doubao .model-header{background:rgba(96,165,250,0.06);color:#60a5fa}
.model-kimi .model-header{background:rgba(244,114,182,0.06);color:#f472b6}
.model-qwen .model-header{background:rgba(167,139,250,0.06);color:#a78bfa}
.model-glm .model-header{background:rgba(52,211,153,0.06);color:#34d399}
.model-deepseek .model-header{background:rgba(251,191,36,0.06);color:#fbbf24}

/* Model status dot */
.model-status{display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--text2)}
.model-status .dot{width:6px;height:6px;border-radius:50%;background:#ef4444}
.model-status .dot.on{background:#34d399;box-shadow:0 0 6px rgba(52,211,153,0.5)}

/* Decompose */
.decompose-card{border-left:3px solid var(--accent1);padding:18px;background:var(--card);border-radius:0 12px 12px 0;margin-bottom:10px;animation:fadeInUp .35s ease both}
.decompose-card.missing{border-left-color:#f87171;background:rgba(248,113,113,0.03)}
.decompose-card h4{font-size:14px;margin-bottom:8px;display:flex;align-items:center;gap:8px;font-weight:600}
.decompose-card .missing-tag{font-size:11px;padding:2px 10px;border-radius:6px;background:rgba(248,113,113,0.1);color:#f87171}
.decompose-card .found-tag{font-size:11px;padding:2px 10px;border-radius:6px;background:rgba(52,211,153,0.1);color:#34d399}
.decompose-card p{font-size:13px;color:var(--text2);line-height:1.6}
.decompose-card .content{font-size:13px;line-height:1.6;margin-top:8px;padding:10px 14px;background:rgba(255,255,255,0.02);border-radius:8px;border:1px solid var(--border)}

/* Score comparison */
.score-compare{display:flex;gap:28px;align-items:center;justify-content:center;flex-wrap:wrap;padding:20px 0}
.score-compare .vs{font-size:22px;font-weight:700;color:var(--text2)}

/* Toast */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:linear-gradient(135deg,var(--accent1),var(--accent2));color:#0c0c10;border-radius:10px;padding:12px 24px;font-size:13px;font-weight:600;z-index:1000;transition:transform .4s cubic-bezier(.4,0,.2,1);pointer-events:none;box-shadow:0 4px 20px var(--glow)}
.toast.show{transform:translateX(-50%) translateY(0)}

/* Grid helpers */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.mt-16{margin-top:16px}
.mb-8{margin-bottom:8px}

/* API response */
.api-response{background:rgba(0,0,0,0.3);border:1px solid var(--border);border-radius:10px;padding:16px;margin-top:12px;font-size:13px;line-height:1.7;white-space:pre-wrap;max-height:400px;overflow-y:auto}
.api-loading{display:flex;align-items:center;gap:10px;padding:14px;color:var(--text2);font-size:13px}
.api-loading .spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent1);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.api-error{color:#f87171;font-size:12px;margin-top:8px}

/* Responsive */
@media(max-width:768px){
  .grid-2{grid-template-columns:1fr}
  #api-config-grid{grid-template-columns:1fr!important}
  .tmpl-grid{grid-template-columns:1fr}
  .nav-brand{font-size:17px;margin-right:10px}
  .nav-item{padding:16px 12px;font-size:13px}
  .container{padding:20px 14px}
  .card{padding:20px;border-radius:12px}
  .score-compare{gap:16px}
}
@media(max-width:480px){
  .score-summary{flex-wrap:wrap}
  .radar-wrap{max-width:280px}
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <div class="nav-brand">Prompt Tools</div>
    <div class="nav-item active" data-page="optimize">优化</div>
    <div class="nav-item" data-page="generate">生成</div>
    <div class="nav-item" data-page="templates">模板库</div>
    <div class="nav-item" data-page="history">历史</div>
  </div>
</nav>

<div class="container">

<!-- ==================== 优化 + 拆解 ==================== -->
<div class="page active" id="page-optimize">
  <div class="card">
    <div class="card-title"><span class="icon">✨</span> Prompt 优化 & 拆解</div>
    <label>粘贴你的 Prompt，一键获取结构拆解、优化建议和改进版本</label>
    <textarea id="opt-prompt" placeholder="在此粘贴你的 Prompt..."></textarea>
    <div class="btn-group">
      <button class="btn btn-primary" onclick="runOptimize()">一键分析优化</button>
      <button class="btn btn-secondary" onclick="document.getElementById('opt-prompt').value='';document.getElementById('opt-results').style.display='none'">重置</button>
    </div>
  </div>
  <div id="opt-results" style="display:none">
    <div class="card result-card" id="opt-score-compare-card"></div>
    <div class="card result-card" id="opt-decompose-card"></div>
    <div class="card result-card">
      <div class="card-title"><span class="icon">💡</span> 优化建议</div>
      <div id="opt-suggestions"></div>
    </div>
    <div class="card result-card">
      <div class="card-title" style="justify-content:space-between">
        <span style="display:flex;align-items:center;gap:8px"><span class="icon">🚀</span> 改进版 Prompt</span>
        <button class="btn btn-sm btn-secondary" onclick="copyText('opt-improved')">复制</button>
      </div>
      <div id="opt-improved" style="background:var(--input-bg);border-radius:8px;padding:16px;font-size:13px;line-height:1.7;white-space:pre-wrap"></div>
    </div>
  </div>
</div>

<!-- ==================== 生成 ==================== -->
<div class="page" id="page-generate">
  <div class="card">
    <div class="card-title"><span class="icon">🤖</span> 多模型 Prompt 生成</div>
    <label>用自然语言描述你的需求</label>
    <textarea id="gen-desc" placeholder="例如：帮我写一篇关于人工智能在教育中应用的文章，要求1500字，包含具体案例..."></textarea>
    <div class="btn-group">
      <button class="btn btn-primary" onclick="runGenerate()">生成 Prompt</button>
      <button class="btn btn-secondary" onclick="runGenerateAndCall()" id="btn-call-all">生成并调用模型</button>
    </div>
  </div>
  <div id="gen-results" style="display:none"></div>
</div>

<!-- ==================== 模板库 ==================== -->
<div class="page" id="page-templates">
  <div class="card">
    <div class="card-title"><span class="icon">📚</span> Prompt 模板库</div>
    <div class="tabs" id="tmpl-tabs"></div>
    <div class="tmpl-grid" id="tmpl-grid"></div>
  </div>

// ======================== SCORING ENGINE ========================
function scorePrompt(p) {
  const scores = [];
  const len = p.length;

  // 1. 指令理解准确性 — 任务是否清晰
  let s1 = 3;
  if (/请|帮我|生成|写|分析|翻译|总结|解释|列出|设计|创建|制定|撰写/.test(p)) s1 += 2;
  if (/[。\n]/.test(p) && len > 30) s1 += 1;
  if (len > 80) s1 += 1;
  if (len > 200) s1 += 1;
  if (/具体|详细|明确/.test(p)) s1 += 1;
  if (/步骤|第一|第二|首先|然后|1\.|1、/.test(p)) s1 += 1;
  scores.push(Math.min(10, s1));

  // 2. 输出格式遵从度 — 有无格式要求
  let s2 = 2;
  if (/格式|format|结构|排版|列出|分点|表格|markdown|json/i.test(p)) s2 += 3;
  if (/输出|返回|呈现|展示/.test(p)) s2 += 1;
  if (/段落|标题|小标题|编号/.test(p)) s2 += 2;
  if (/字数|长度|字以内|段|条/.test(p)) s2 += 2;
  scores.push(Math.min(10, s2));

  // 3. 内容相关性 — 上下文丰富度
  let s3 = 3;
  if (len > 50) s3 += 1;
  if (len > 100) s3 += 1;
  if (len > 200) s3 += 1;
  if (/背景|上下文|场景|情境|context/.test(p)) s3 += 2;
  if (/关于|针对|围绕|主题/.test(p)) s3 += 1;
  if (/目标受众|读者|用户|面向/.test(p)) s3 += 1;
  scores.push(Math.min(10, s3));

  // 4. 风格匹配度 — 有无风格/语气要求
  let s4 = 2;
  if (/语气|风格|tone|style|口语|正式|活泼|专业|幽默|严肃|轻松|友好/.test(p)) s4 += 3;
  if (/角色|你是|作为|扮演/.test(p)) s4 += 3;
  if (/像|仿佛|如同|模仿/.test(p)) s4 += 1;
  if (/品牌|调性/.test(p)) s4 += 1;
  scores.push(Math.min(10, s4));

  // 5. 可用率 — 约束和边界
  let s5 = 3;
  if (/不要|避免|禁止|请勿|不得|不能/.test(p)) s5 += 2;
  if (/必须|确保|一定要|务必/.test(p)) s5 += 1;
  if (/注意|要求|限制|规则/.test(p)) s5 += 1;
  if (len > 100) s5 += 1;
  if (/【|】|\[|\]|（|）/.test(p)) s5 += 1;
  if (/\n/.test(p)) s5 += 1;
  scores.push(Math.min(10, s5));

  // 6. 创意多样性 — 开放性引导
  let s6 = 3;
  if (/创意|创新|独特|新颖|多样|不同角度|多个|几种/.test(p)) s6 += 2;
  if (/例如|比如|示例|参考/.test(p)) s6 += 2;
  if (/灵感|想象|发散|头脑风暴/.test(p)) s6 += 2;
  if (len > 150) s6 += 1;
  scores.push(Math.min(10, s6));

  // 7. 中文表达自然度 — 是否中文为主
  let s7 = 5;
  const cnChars = (p.match(/[\u4e00-\u9fff]/g) || []).length;
  const cnRatio = cnChars / Math.max(1, len);
  if (cnRatio > 0.3) s7 += 1;
  if (cnRatio > 0.5) s7 += 2;
  if (cnRatio > 0.7) s7 += 2;
  if (/的|了|是|在|和|与|或/.test(p)) s7 += 0;
  scores.push(Math.min(10, s7));

  // 8. 情绪感染力 — 情感词汇
  let s8 = 3;
  if (/感人|震撼|温暖|激动|共鸣|打动|触动|热情|真诚|感染|生动|有趣|精彩/.test(p)) s8 += 3;
  if (/！|!/.test(p)) s8 += 1;
  if (/情感|情绪|氛围|感受|体验/.test(p)) s8 += 2;
  if (/故事|叙事|案例|经历/.test(p)) s8 += 1;
  scores.push(Math.min(10, s8));

  return scores;
}

function getGrade(avg) {
  if (avg >= 9) return { letter: 'S', label: '卓越', cls: 'grade-s' };
  if (avg >= 7.5) return { letter: 'A', label: '优秀', cls: 'grade-a' };
  if (avg >= 6) return { letter: 'B', label: '良好', cls: 'grade-b' };
  if (avg >= 4.5) return { letter: 'C', label: '中等', cls: 'grade-c' };
  return { letter: 'D', label: '待改进', cls: 'grade-d' };
}

function getBarClass(score) {
  if (score >= 8) return 'great';
  if (score >= 6) return 'high';
  if (score >= 4) return 'mid';
  return 'low';
}

function renderScoreBars(scores, containerId) {
  let html = '';
  DIMS.forEach((d, i) => {
    const s = scores[i];
    html += `<div class="score-bar-wrap" style="animation-delay:${i * 0.05}s">
      <div class="score-bar-label"><span>${d}</span><span>${s}/10</span></div>
      <div class="score-bar"><div class="score-bar-fill ${getBarClass(s)}" style="width:${s * 10}%"></div></div>
    </div>`;
  });
  document.getElementById(containerId).innerHTML = html;
}

function renderScoreCircle(total, maxScore, label) {
  const avg = (total / DIMS.length).toFixed(1);
  const grade = getGrade(parseFloat(avg));
  return `<div style="text-align:center">
    <div class="score-circle ${grade.cls}">
      <div class="num">${total}</div>
      <div class="lbl">/ ${maxScore}</div>
    </div>
    <div style="font-size:13px;color:var(--text2)">${label}</div>
    <div style="font-size:14px;font-weight:700;margin-top:4px;color:var(--accent1)">${grade.letter} · ${grade.label}</div>
  </div>`;
}

// ======================== 优化 + 拆解 ========================
function runOptimize() {
  const prompt = document.getElementById('opt-prompt').value.trim();
  if (!prompt) { showToast('请输入 Prompt'); return; }

  const beforeScores = scorePrompt(prompt);
  const beforeTotal = beforeScores.reduce((a, b) => a + b, 0);

  const suggestions = analyzePrompt(prompt);
  const improved = generateImproved(prompt, suggestions);

  const afterScores = scorePrompt(improved);
  const afterTotal = afterScores.reduce((a, b) => a + b, 0);

  // Score comparison
  const diff = afterTotal - beforeTotal;
  const diffText = diff > 0 ? `<span style="color:#22c55e;font-weight:700">+${diff} 分</span>` : `<span style="color:var(--text2)">${diff} 分</span>`;
  document.getElementById('opt-score-compare-card').innerHTML = `
    <div class="card-title"><span class="icon">📊</span> 优化前后对比</div>
    <div class="score-compare">
      ${renderScoreCircle(beforeTotal, 80, '优化前')}
      <div class="vs">→</div>
      ${renderScoreCircle(afterTotal, 80, '优化后')}
    </div>
    <div style="text-align:center;font-size:13px;color:var(--text2)">提升 ${diffText}</div>`;

  // Decompose inline
  const parts = decomposePrompt(prompt);
  const labels = [
    { key: 'role', name: '角色', icon: '👤', weight: 20 },
    { key: 'task', name: '任务', icon: '🎯', weight: 30 },
    { key: 'format', name: '格式', icon: '📋', weight: 20 },
    { key: 'constraint', name: '约束', icon: '🔒', weight: 15 },
    { key: 'example', name: '示例', icon: '📝', weight: 15 }
  ];
  let completeness = 0;
  labels.forEach(l => { if (parts[l.key]) completeness += l.weight; });

  let decHTML = `<div class="card-title"><span class="icon">🔍</span> 结构拆解 <span style="font-size:13px;font-weight:400;color:var(--text2);margin-left:8px">完整度 ${completeness}/100</span></div>
    <div class="score-bar" style="height:8px;margin-bottom:16px"><div class="score-bar-fill ${getBarClass(completeness/10)}" style="width:${completeness}%"></div></div>`;
  labels.forEach((l, i) => {
    const content = parts[l.key];
    const missing = !content;
    decHTML += `<div class="decompose-card ${missing ? 'missing' : ''}" style="animation-delay:${i * 0.05}s">
      <h4>${l.icon} ${l.name} ${missing ? '<span class="missing-tag">缺失 -' + l.weight + '分</span>' : '<span class="found-tag">+' + l.weight + '分</span>'}</h4>
      ${content ? `<div class="content">${escapeHtml(content)}</div>` : `<div class="content" style="color:#ef4444;font-style:italic">未检测到${l.name}定义，建议补充</div>`}
    </div>`;
  });
  document.getElementById('opt-decompose-card').innerHTML = decHTML;

  let sugHTML = '';
  suggestions.forEach((s, i) => {
    sugHTML += `<div class="suggestion" style="animation-delay:${i * 0.06}s">
      <div class="sug-icon ${s.type}">${s.icon}</div>
      <div class="sug-text"><strong>${s.title}</strong><br>${s.desc}</div>
    </div>`;
  });
  document.getElementById('opt-suggestions').innerHTML = sugHTML;
  document.getElementById('opt-improved').textContent = improved;
  document.getElementById('opt-results').style.display = 'block';
  document.getElementById('opt-results').scrollIntoView({ behavior: 'smooth' });

  // Save history
  saveHistory({ prompt, scores: beforeScores, total: beforeTotal, avg: parseFloat((beforeTotal / beforeScores.length).toFixed(1)), grade: getGrade(beforeTotal / beforeScores.length).letter, gradeLabel: getGrade(beforeTotal / beforeScores.length).label, time: new Date().toLocaleString('zh-CN') });
}

function analyzePrompt(p) {
  const s = [];
  if (p.length < 50) s.push({ type: 'sug-warn', icon: '!', title: '内容过于简短', desc: 'Prompt 过短可能导致模型输出不够精确。建议补充更多上下文信息、具体要求和期望的输出格式。' });
  if (p.length > 2000) s.push({ type: 'sug-info', icon: 'i', title: '内容较长', desc: '过长的 Prompt 可能导致模型遗漏部分指令。建议精简冗余信息，保留核心要求，或使用分步指令。' });
  if (!/角色|你是|作为|扮演|assume|act as|you are/i.test(p)) s.push({ type: 'sug-tip', icon: '+', title: '缺少角色定义', desc: '添加角色设定（如"你是一位资深编辑"）可以显著提升输出质量，让模型更好地理解语境和期望的专业程度。' });
  if (!/格式|format|输出|结构|排版|列出|分点|表格|markdown/i.test(p)) s.push({ type: 'sug-tip', icon: '+', title: '缺少格式要求', desc: '明确的格式要求（如"用markdown表格输出"、"分点列出"）能让输出更加结构化，方便直接使用。' });
  if (!/例如|比如|示例|example|举例|参考/i.test(p)) s.push({ type: 'sug-tip', icon: '+', title: '缺少示例', desc: '提供一个期望输出的示例（Few-shot）可以显著提升输出与预期的一致性，是最有效的 Prompt 优化手段之一。' });
  if (!/不要|避免|禁止|请勿|don't|do not|never|must not/i.test(p)) s.push({ type: 'sug-info', icon: 'i', title: '缺少约束条件', desc: '适当的负面约束（如"不要使用专业术语"、"避免过于正式的语气"）可以帮助过滤不期望的输出。' });
  if (!/步骤|第一|第二|首先|然后|接着|最后|1\.|1、|step/i.test(p)) s.push({ type: 'sug-tip', icon: '+', title: '建议使用分步指令', desc: '将复杂任务拆分为明确的步骤，可以引导模型按逻辑顺序完成任务，提升输出质量。' });
  if (!/字数|长度|words|字以内|段落|简短|详细/i.test(p)) s.push({ type: 'sug-info', icon: 'i', title: '缺少长度控制', desc: '指定输出的字数范围或段落数量，可以更好地控制输出的详略程度。' });
  if (!/语气|风格|tone|style|口语|正式|活泼|专业|幽默/i.test(p)) s.push({ type: 'sug-info', icon: 'i', title: '建议指定语气风格', desc: '明确语气风格（如"用轻松幽默的口吻"）能让输出的表达方式更符合预期。' });
  if (!/目标受众|读者|用户|面向|给谁看|target/i.test(p)) s.push({ type: 'sug-info', icon: 'i', title: '建议指定目标受众', desc: '说明目标读者或受众，帮助模型调整表达的深度和风格。' });
  if (s.length === 0) s.push({ type: 'sug-tip', icon: '✓', title: '整体结构良好', desc: '你的 Prompt 已经涵盖了大部分关键要素。' });
  return s;
}

function generateImproved(p, suggestions) {
  let parts = [];
  const hasRole = /角色|你是|作为|扮演/i.test(p);
  const hasFormat = /格式|format|输出|结构|列出|表格/i.test(p);
  const hasConstraint = /不要|避免|禁止/i.test(p);
  const hasLength = /字数|长度|字以内/i.test(p);
  const hasTone = /语气|风格|口语|正式|活泼/i.test(p);
  const hasExample = /例如|比如|示例|参考/i.test(p);
  const hasAudience = /目标受众|读者|用户|面向/i.test(p);

  if (!hasRole) {
    const topic = p.substring(0, 20);
    parts.push('## 角色设定\n你是一位经验丰富的专业人士，擅长用生动有趣的方式处理与"' + topic + '..."相关的任务。\n');
  }
  parts.push('## 任务描述\n' + p + '\n');
  if (!hasAudience) parts.push('## 目标受众\n面向对该主题感兴趣的普通读者，确保内容通俗易懂。\n');
  if (!hasFormat) parts.push('## 输出格式\n请按以下结构组织你的回答：\n1. 先给出核心要点的概述\n2. 然后详细展开每个部分\n3. 最后给出总结和建议\n');
  if (!hasExample) parts.push('## 参考示例\n在关键观点处提供具体的案例或经历来支撑，例如用实际场景说明。\n');
  if (!hasConstraint) parts.push('## 注意事项\n- 确保内容准确、有依据\n- 避免空泛的表述，尽量具体\n- 不要使用过于复杂的专业术语\n- 语言清晰易懂\n');
  if (!hasLength) parts.push('## 篇幅要求\n请控制在 800-1500 字之间，确保内容充实且不冗余。\n');
  if (!hasTone) parts.push('## 风格要求\n语言专业但不晦涩，通俗易懂，富有感染力。适当使用类比和故事帮助理解，让内容生动有趣。\n');

  return parts.join('\n');
}

// ======================== Backend API ========================
let modelStatus = {};

async function loadModelStatus() {
  try {
    const res = await fetch('/api/models');
    modelStatus = await res.json();
  } catch(e) {
    modelStatus = {};
  }
}

async function callModelAPI(model, prompt) {
  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model, prompt })
    });
    const data = await res.json();
    if (data.error) return `[错误] ${data.error}`;
    return data.content;
  } catch (e) {
    return `[错误] ${e.message}`;
  }
}

async function callAllModels(prompts) {
  try {
    const res = await fetch('/api/chat/all', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompts })
    });
    return await res.json();
  } catch (e) {
    return {};
  }
}

function runGenerate() {
  const desc = document.getElementById('gen-desc').value.trim();
  if (!desc) { showToast('请描述你的需求'); return; }
  const models = getGenerateModels();
  lastGeneratedModels = models;
  renderGenerateResults(desc, models, false);
}

function getModelPrompts(desc, models) {
  const prompts = {};
  models.forEach(m => { prompts[m.key] = m.gen(desc); });
  return prompts;
}

let lastGeneratedModels = [];

async function runGenerateAndCall() {
  const desc = document.getElementById('gen-desc').value.trim();
  if (!desc) { showToast('请描述你的需求'); return; }

  const models = getGenerateModels();
  lastGeneratedModels = models;
  renderGenerateResults(desc, models, true);

  // Collect prompts and call all models in parallel
  const prompts = {};
  models.forEach(m => { prompts[m.key] = m.gen(desc); });

  // Show loading on all cards
  models.forEach(m => {
    const el = document.getElementById('model-response-' + m.key);
    if (el && modelStatus[m.key]?.ready) {
      el.innerHTML = `<div class="api-loading"><div class="spinner"></div>正在调用 ${m.name}，请稍候...</div>`;
    }
  });

  const results = await callAllModels(prompts);

  // Fill in responses
  for (const [key, result] of Object.entries(results)) {
    const el = document.getElementById('model-response-' + key);
    if (!el) continue;
    if (result.error) {
      el.innerHTML = `<div class="api-error">[错误] ${escapeHtml(result.error)}</div>`;
    } else {
      el.innerHTML = `<div style="font-size:12px;color:var(--accent1);margin-top:12px;margin-bottom:4px;font-weight:600">模型回复：</div><div class="api-response">${escapeHtml(result.content)}</div>`;
    }
  }
}

function renderGenerateResults(desc, models, showCallButtons) {
  let html = '';
  models.forEach((m, i) => {
    const promptText = m.gen(desc);
    const pScore = scorePrompt(promptText);
    const pTotal = pScore.reduce((a, b) => a + b, 0);
    const pAvg = (pTotal / pScore.length).toFixed(1);
    const pGrade = getGrade(parseFloat(pAvg));
    const isReady = modelStatus[m.key]?.ready;

    html += `<div class="card model-card ${m.cls} result-card" style="animation-delay:${i * 0.08}s;margin-bottom:12px">
      <div class="model-header">
        <span>${m.name} <span style="font-size:12px;font-weight:400;opacity:0.7;margin-left:8px">${pGrade.letter} · ${pTotal}/80</span>

  });

  const readyCount = Object.values(modelStatus).filter(m => m.ready).length;

  const headerCard = `<div class="card result-card" style="margin-bottom:12px">
    <div class="card-title"><span class="icon">📊</span> 你的原始描述评分</div>
    <div class="score-summary">

  </div>`;

  document.getElementById('gen-results').innerHTML = headerCard + html;
  document.getElementById('gen-results').style.display = 'block';
  document.getElementById('gen-results').scrollIntoView({ behavior: 'smooth' });
}

async function callModel(modelKey) {
  const promptEl = document.getElementById('model-pre-' + modelKey);
  const responseEl = document.getElementById('model-response-' + modelKey);
  if (!promptEl || !responseEl) return;

  const prompt = promptEl.textContent;
  responseEl.innerHTML = `<div class="api-loading"><div class="spinner"></div>正在调用模型，请稍候...</div>`;
  responseEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  const result = await callModelAPI(modelKey, prompt);
  if (result.startsWith('[错误]')) {
    responseEl.innerHTML = `<div class="api-error">${escapeHtml(result)}</div>`;
  } else {
    responseEl.innerHTML = `<div style="font-size:12px;color:var(--accent1);margin-top:12px;margin-bottom:4px;font-weight:600">模型回复：</div><div class="api-response">${escapeHtml(result)}</div>`;
  }
}

function decomposePrompt(p) {
  const result = { role: '', task: '', format: '', constraint: '', example: '' };
  const lines = p.split('\n').map(l => l.trim()).filter(Boolean);

  const rolePatterns = [/你是(.+?)(?:\.|。|，|,|$)/i, /作为(.+?)(?:\.|。|，|,|$)/i, /扮演(.+?)(?:\.|。|，|,|$)/i, /角色[：:](.+?)(?:\.|。|$)/i, /(?:act as|you are|assume the role of)(.+?)(?:\.|$)/i];
  for (const line of lines) {
    for (const pat of rolePatterns) {
      if (line.match(pat)) { result.role = line; break; }
    }
    if (result.role) break;
  }

  const exampleStart = lines.findIndex(l => /例如|比如|示例|example|举例|参考|如下|样例/i.test(l));
  if (exampleStart >= 0) {
    const exLines = [lines[exampleStart]];
    for (let i = exampleStart + 1; i < lines.length && i < exampleStart + 5; i++) {
      if (/^[\s\-\*\d]/.test(lines[i]) || lines[i].length < 100) exLines.push(lines[i]);
      else break;
    }
    result.example = exLines.join('\n');
  }

  const formatLines = lines.filter(l => /格式|format|输出|结构|排版|列出|分点|表格|markdown|json|xml|字数|长度|段落/i.test(l));
  if (formatLines.length) result.format = formatLines.join('\n');

  const constraintLines = lines.filter(l => /不要|避免|禁止|请勿|don't|do not|never|must not|限制|注意|要求|必须|确保|不得|不能|不可以/i.test(l));
  if (constraintLines.length) result.constraint = constraintLines.join('\n');

  const taskLines = lines.filter(l => l !== result.role && !constraintLines.includes(l) && !formatLines.includes(l) && (!result.example || !result.example.includes(l)));
  if (taskLines.length) result.task = taskLines.slice(0, 8).join('\n');
  else result.task = p.substring(0, 300);

  return result;
}

// ======================== 模板库 ========================
let tmplInited = false;
function initTemplates() {
  if (tmplInited) return;
  tmplInited = true;
  const cats = Object.keys(TEMPLATES);
  const tabsEl = document.getElementById('tmpl-tabs');
  cats.forEach((c, i) => {
    tabsEl.innerHTML += `<div class="tab ${i === 0 ? 'active' : ''}" data-cat="${c}" onclick="switchTmplTab('${c}')">${c}</div>`;
  });
  renderTemplates(cats[0]);
}

function switchTmplTab(cat) {
  document.querySelectorAll('#tmpl-tabs .tab').forEach(t => t.classList.toggle('active', t.dataset.cat === cat));
  renderTemplates(cat);
}

function renderTemplates(cat) {
  const grid = document.getElementById('tmpl-grid');
  const items = TEMPLATES[cat] || [];
  grid.innerHTML = items.map((t, i) => {
    const ts = scorePrompt(t.prompt);
    const tt = ts.reduce((a, b) => a + b, 0);
    const tg = getGrade(tt / ts.length);
    return `<div class="tmpl-card" onclick="applyTemplate(${JSON.stringify(t.prompt).replace(/"/g, '&quot;')})">
      <h4>${t.title} <span class="tmpl-score">${tg.letter} · ${tt}/80</span></h4>
      <p>${t.desc}</p>
      <p style="margin-top:8px;font-size:11px;color:#666;max-height:60px;overflow:hidden">${escapeHtml(t.prompt.substring(0, 120))}...</p>
      <span class="tmpl-tag">${cat}</span>
    </div>`;
  }).join('');
}

function applyTemplate(prompt) {
  document.querySelectorAll('.nav-item').forEach(n => {
    n.classList.toggle('active', n.dataset.page === 'optimize');
  });
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-optimize').classList.add('active');
  document.getElementById('opt-prompt').value = prompt;
  document.getElementById('opt-prompt').focus();
  showToast('模板已套用到优化模块');
}

// ======================== 历史 ========================
function getHistory() {
  try { return JSON.parse(localStorage.getItem('prompt_eval_history') || '[]'); }
  catch { return []; }
}
function saveHistory(record) {
  const h = getHistory();
  h.unshift(record);
  if (h.length > 100) h.length = 100;
  localStorage.setItem('prompt_eval_history', JSON.stringify(h));
}
function clearHistory() {
  if (confirm('确定要清空所有历史记录吗？')) {
    localStorage.removeItem('prompt_eval_history');
    renderHistory();
    showToast('历史已清空');
  }
}

function renderHistory() {
  const h = getHistory();

  const ranked = [...h].sort((a, b) => b.total - a.total).slice(0, 5);
  const rankEl = document.getElementById('ranking-list');
  if (ranked.length === 0) {
    rankEl.innerHTML = '<div style="color:var(--text2);font-size:13px;padding:8px 0">暂无评估记录</div>';
  } else {
    rankEl.innerHTML = ranked.map((r, i) => {
      const cls = i < 3 ? `rank-${i + 1}` : 'rank-other';
      return `<div class="history-item" style="cursor:default">
        <div style="display:flex;align-items:center">
          <span class="rank-badge ${cls}">${i + 1}</span>
          <div style="flex:1;min-width:0">
            <div class="history-prompt">${escapeHtml(r.prompt.substring(0, 80))}</div>
            <div class="history-meta" style="margin:4px 0 0">${r.time} · ${r.gradeLabel}</div>
          </div>
          <div class="history-score">${r.total}/80</div>
        </div>
      </div>`;
    }).join('');
  }

  const listEl = document.getElementById('history-list');
  if (h.length === 0) {
    listEl.innerHTML = '<div style="color:var(--text2);font-size:13px;padding:8px 0">暂无历史记录</div>';
  } else {
    listEl.innerHTML = h.map((r, i) => `
      <div class="history-item" onclick="this.classList.toggle('open')">
        <div class="history-meta">
          <span>${r.time}</span>
          <span class="history-score">${r.grade} · ${r.total}/80</span>
        </div>
        <div class="history-prompt">${escapeHtml(r.prompt.substring(0, 100))}</div>
        <div class="history-detail">
          <div style="margin-bottom:8px">
            ${DIMS.map((d, j) => `<div class="score-bar-wrap"><div class="score-bar-label"><span>${d}</span><span>${r.scores[j]}/10</span></div><div class="score-bar"><div class="score-bar-fill ${getBarClass(r.scores[j])}" style="width:${r.scores[j]*10}%"></div></div></div>`).join('')}
          </div>
          <div class="btn-group">
            <button class="btn btn-sm btn-danger" onclick="event.stopPropagation();deleteHistory(${i})">删除</button>
            <button class="btn btn-sm btn-secondary" onclick="event.stopPropagation();reusePrompt('${encodeURIComponent(r.prompt)}')">重新评估</button>
          </div>
        </div>
      </div>`).join('');
  }
}

function deleteHistory(idx) {
  const h = getHistory();
  h.splice(idx, 1);
  localStorage.setItem('prompt_eval_history', JSON.stringify(h));
  renderHistory();
  showToast('已删除');
}

function reusePrompt(encoded) {
  const prompt = decodeURIComponent(encoded);
  document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.page === 'optimize'));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-optimize').classList.add('active');
  document.getElementById('opt-prompt').value = prompt;
  document.getElementById('opt-prompt').focus();
}

// ======================== UTILS ========================
function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function copyText(id) {
  const text = document.getElementById(id).textContent;
  navigator.clipboard.writeText(text).then(() => showToast('已复制到剪贴板'));
}

function copyFromPre(id) {
  const text = document.getElementById(id).textContent;
  navigator.clipboard.writeText(text).then(() => showToast('已复制到剪贴板'));
}

// Init
initTemplates();
loadModelStatus();
